<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aulia 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{ --pink:#ff4d6d; --glass: rgba(255,255,255,0.15);} body { margin: 0; font-family: 'Poppins', sans-serif; text-align: center; overflow-x: hidden; color: white; }

.page { display: none; min-height: 100vh; padding: 24px 16px 90px; /* extra bottom space for button */ opacity: 0; transition: all 0.6s ease; background-size: cover; background-position: center; } .page.active { display: block; opacity: 1; }

h1 { font-family: 'Playfair Display', serif; /* lebih readable & elegan / font-size: 1.9em; / diturunin lagi */ margin: 12px 0 6px; line-height: 1.2; }

p { font-size: 14px; margin: 6px 0; }

.card { background: var(--glass); backdrop-filter: blur(12px); border-radius: 20px; padding: 16px; margin-top: 14px; }

button { padding: 12px 28px; margin: 12px; border: none; border-radius: 999px; background: linear-gradient(45deg,#ff4d6d,#ff8fa3); color: white; cursor: pointer; font-weight: 600; box-shadow: 0 6px 18px rgba(0,0,0,0.25); transition: transform .2s ease; } button:hover { transform: scale(1.06); }

.gallery { display: flex; overflow-x: auto; gap: 12px; padding: 16px; scroll-snap-type: x mandatory; } .gallery img { width: 180px; border-radius: 14px; cursor: pointer; scroll-snap-align: center; transition: transform .25s; } .gallery img:hover { transform: scale(1.04); }

.scroll-box { max-height: 320px; overflow-y: auto; } .gif { width: 64px; }

/* MODAL */ .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); justify-content: center; align-items: center; flex-direction: column; z-index: 1000; } .modal img { max-width: 86%; border-radius: 16px; animation: zoomIn .35s ease; } .modal-text { margin-top: 10px; max-width: 86%; } .close-btn { background:#fff; color:#000; } @keyframes zoomIn { from { transform: scale(.6); opacity: 0;} to { transform: scale(1); opacity:1;} }

/* SPARKLES */ .sparkle { position: fixed; width: 4px; height: 4px; background: #fff; border-radius: 50%; opacity: .7; animation: float 6s linear infinite; } @keyframes float { from { transform: translateY(100vh); opacity:0;} to { transform: translateY(-10vh); opacity:1;} } @keyframes floatBlob { from { transform: translateY(0) translateX(0);} to { transform: translateY(-120vh) translateX(40px);} } to { transform: translateY(-10vh); opacity:1;} }

/* MUSIC BUTTON – pindah & aman dari ketutupan */

</style>
</head>
<body><!-- SPARKLES --><div id="sparkles"></div><!-- PAGE 1 --><div class="page active" id="page1" style="background-image:url('bg1.jpg')">
  <h1>for you, aulia 🤍</h1>
  <img class="gif" src="gif1.gif"> <img class="gif" src="gif2.gif">
  <br>
  <button onclick="goPage(2)">Next</button></div><!-- PAGE 2 --><div class="page" id="page2" style="background-image:url('bg2.jpg')">
  <h1><img class="gif" src="gif1.gif"> sedikit cerita tentang kita <img class="gif" src="gif2.gif"></h1>
  <div class="card scroll-box" id="typingText"></div>
  <button onclick="goPage(1)">Back</button>
  <button onclick="goPage(3)">Next</button></div><!-- PAGE 3 --><div class="page" id="page3" style="background-image:url('bg3.jpg')">
  <h1>my fav pictures of you</h1>
  <div class="gallery">
    <img src="foto1.jpg" onclick="openModal(this,'Alasan 1')">
    <img src="foto2.jpg" onclick="openModal(this,'Alasan 2')">
    <img src="foto3.jpg" onclick="openModal(this,'Alasan 3')">
  </div>
  <button onclick="goPage(2)">Back</button>
  <button onclick="goPage(4)">Next</button></div><!-- PAGE 4 --><div class="page" id="page4" style="background-image:url('bg4.jpg')">
  <h1>our pictures together</h1>
  <div class="gallery">
    <img src="our1.jpg" onclick="openModal(this,'Kenangan kita di sini...')">
    <img src="our2.jpg" onclick="openModal(this,'Moment ini ga bakal gue lupa...')">
    <img src="our3.jpg" onclick="openModal(this,'Disini kita ketawa bareng 😭')">
  </div>
  <button onclick="goPage(3)">Back</button>
  <button onclick="goPage(5)">Next</button></div><!-- PAGE 5 --><div class="page" id="page5" style="background-image:url('bg5.jpg')">
  <h1><img class="gif" src="gif1.gif"> pesan dari aku buat kamu <img class="gif" src="gif2.gif"></h1>
  <div class="card" id="typingMessage"></div>
  <button onclick="goPage(4)">Back</button>
  <button onclick="goPage(6)">Next</button></div><!-- PAGE 6 --><div class="page" id="page6" style="background-image:url('bg6.jpg')">
  <h1>dibuat sama raka, aku harap kamu suka ya 🤍</h1>
  <button onclick="goPage(5)">Back</button></div><!-- MODAL --><div class="modal" id="modal">
  <img id="modalImg">
  <div class="modal-text" id="modalText"></div>
  <button class="close-btn" onclick="closeModal()">Close</button>
</div><script>
function goPage(page){ document.querySelector('.active').classList.remove('active'); document.getElementById('page'+page).classList.add('active'); }
function openModal(img,text){ modal.style.display='flex'; modalImg.src=img.src; modalText.innerText=text; }
function closeModal(){ modal.style.display='none'; }
function toggleMusic(){ let m=document.getElementById('music'); if(m.paused){ m.play(); } else { m.pause(); } }
function typeText(el,text){ let i=0; el.innerHTML=''; function t(){ if(i<text.length){ el.innerHTML+=text[i++]; setTimeout(t,25);} } t(); }
window.onload=()=>{
  typeText(document.getElementById('typingText'),'Tulis cerita kalian di sini...');
  typeText(document.getElementById('typingMessage'),'Isi pesan kamu di sini...');
  // enhanced sparkles + floating particles
  for(let i=0;i<40;i++){
    let s=document.createElement('div');
    s.className='sparkle';
    s.style.left=Math.random()*100+'vw';
    s.style.width = s.style.height = (3+Math.random()*4)+'px';
    s.style.opacity = 0.5 + Math.random()*0.5;
    s.style.animationDuration=(3+Math.random()*6)+'s';
    document.body.appendChild(s);
  }

  // floating soft blobs
  for(let i=0;i<10;i++){
    let b=document.createElement('div');
    b.style.position='fixed';
    b.style.width = b.style.height = (60+Math.random()*120)+'px';
    b.style.borderRadius='50%';
    b.style.background='rgba(255,255,255,0.08)';
    b.style.left=Math.random()*100+'vw';
    b.style.top=Math.random()*100+'vh';
    b.style.filter='blur(20px)';
    b.style.animation='floatBlob '+(10+Math.random()*10)+'s linear infinite';
    document.body.appendChild(b);
  } 
}
</script></body>
</html>
